<button class="avgc-theme-toggle" (click)="toggle()" [attr.aria-label]="isDark() ? 'Switch to light mode' : 'Switch to dark mode'" role="switch" [attr.aria-checked]="isDark()">
  @if (isDark()) {
    <svg class="avgc-theme-toggle__icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
  } @else {
    <svg class="avgc-theme-toggle__icon" width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M17 10.5A7.5 7.5 0 119.5 3 7 7 0 0017 10.5z" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  }
</button>
