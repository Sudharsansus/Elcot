@if (isOpen()) {
  <div class="avgc-drawer__backdrop" (click)="onBackdropClick($event)" (keydown)="onKeyDown($event)" role="dialog" aria-modal="true" [attr.aria-label]="title()">
    <aside class="avgc-drawer" [class.avgc-drawer--right]="position() === 'right'" [style.width]="width()">
      <div class="avgc-drawer__header">
        <h2 class="avgc-drawer__title">{{ title() }}</h2>
        <button class="avgc-drawer__close" (click)="close()" aria-label="Close drawer">&times;</button>
      </div>
      <div class="avgc-drawer__body">
        <ng-content></ng-content>
      </div>
      <ng-content select="[avgcDrawerFooter]"></ng-content>
    </aside>
  </div>
}
