<article class="avgc-scheme-card" role="article">
  <div class="avgc-scheme-card__badge">{{ category() }}</div>
  <div class="avgc-scheme-card__content">
    <h3 class="avgc-scheme-card__name">{{ name() }}</h3>
    @if (nameTamil()) { <p class="avgc-scheme-card__name-ta">{{ nameTamil() }}</p> }
    <p class="avgc-scheme-card__desc">{{ description() }}</p>
    <div class="avgc-scheme-card__meta">
      <span class="avgc-scheme-card__subsidy">Max Subsidy: ₹{{ maxSubsidy() | number:'en-IN' }}</span>
      <span class="avgc-scheme-card__count">{{ totalApplications() }} applications</span>
    </div>
    <div class="avgc-scheme-card__dates">Valid: {{ startDate() }} to {{ endDate() }}</div>
  </div>
  <div class="avgc-scheme-card__actions">
    <button class="avgc-scheme-card__btn avgc-scheme-card__btn--primary" (click)="applyNow.emit()">Apply Now</button>
    <button class="avgc-scheme-card__btn avgc-scheme-card__btn--outline" (click)="viewDetails.emit()">View Details</button>
  </div>
</article>
