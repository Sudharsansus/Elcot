@if (isOpen()) {
  <div class="avgc-modal__backdrop" (click)="onBackdropClick()" (keydown)="onKeyDown($event)">
    <div class="avgc-modal" [class]="'avgc-modal--' + size()" role="dialog" aria-modal="true" [attr.aria-label]="title()">
      <div class="avgc-modal__header">
        <h2 class="avgc-modal__title">{{ title() }}</h2>
        <button class="avgc-modal__close" (click)="close()" aria-label="Close">&times;</button>
      </div>
      <div class="avgc-modal__body"><ng-content></ng-content></div>
      <div class="avgc-modal__footer">
        <ng-content select="[avgcModalActions]"></ng-content>
      </div>
    </div>
  </div>
}
