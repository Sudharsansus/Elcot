# ============================================================
# Render Blueprint — Tamil Nadu AVGC-XR Portal (FULL STACK)
# ============================================================
# One Blueprint creates everything: Postgres x2, Redis, RabbitMQ, Elasticsearch,
# MinIO, API, worker, CMS, and the 3 Angular static-site portals.
# Apply from the Render dashboard: New > Blueprint > this repo.
# ============================================================
# Built from the repo's REAL config (apps/api application.yml, apps/cms config,
# the Dockerfiles) — not a blind copy of infra/docker. Deliberate, verified
# adaptations for Render:
#   - pgbouncer DROPPED: connect the API straight to managed Postgres. The API
#     URL template uses ${PGBOUNCER_PORT} as the port, so we set PGBOUNCER_PORT
#     to the managed Postgres port (5432).
#   - nginx DROPPED: every Render service gets its own HTTPS URL; no reverse
#     proxy needed.
#   - RABBITMQ_VHOST set to "/" (the always-present default) so no vhost has to
#     be provisioned (compose seeded "/avgcxr" via definitions.json).
#
# VERIFICATION STATUS (honest):
#   ✅ The 3 STATIC PORTALS build clean locally and are fully verified.
#   ⚠️  The API / worker / CMS / datastores are wired with the correct env-var
#       NAMES from the real config, but cannot be runtime-verified from here.
#       They need your secrets (auto-generated below where possible) and a
#       first-deploy pass. See docs/DEPLOY-RENDER.md §"Full-stack notes".
#
# Plan names + a few Render specifics (Redis auth, MinIO endpoint, ports) may
# need confirming against current Render docs on first apply — flagged inline.
# ============================================================

databases:
  # Primary Postgres for the API (Flowable + JPA, db "avgcxr_portal").
  - name: avgcxr-postgres
    databaseName: avgcxr_portal
    user: avgcxr_user
    plan: basic-1gb

  # Separate Postgres for the Strapi CMS (db "avgc_xr_cms").
  - name: avgcxr-cms-db
    databaseName: avgc_xr_cms
    user: avgc_user
    plan: basic-256mb

services:
  # ============================================================
  # DATASTORES
  # ============================================================

  # ---- Redis (managed) ----
  - type: redis
    name: avgcxr-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []          # internal only (no public access)

  # ---- RabbitMQ (private service, official image + disk) ----
  - type: pserv
    name: avgcxr-rabbitmq
    runtime: image
    image:
      url: docker.io/library/rabbitmq:3.13-management-alpine
    plan: standard
    disk:
      name: rabbitmq-data
      mountPath: /var/lib/rabbitmq
      sizeGB: 10
    envVars:
      - key: RABBITMQ_DEFAULT_USER
        value: avgcxr_rmq_user
      - key: RABBITMQ_DEFAULT_PASS
        generateValue: true   # referenced by api + worker via fromService

  # ---- Elasticsearch 8 (private service, official image + disk) ----
  - type: pserv
    name: avgcxr-elasticsearch
    runtime: image
    image:
      url: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    plan: standard            # needs >= 2 GB RAM
    disk:
      name: es-data
      mountPath: /usr/share/elasticsearch/data
      sizeGB: 20
    envVars:
      - key: discovery.type
        value: single-node
      - key: xpack.security.enabled
        value: "false"
      - key: ES_JAVA_OPTS
        value: "-Xms1g -Xmx1g"

  # ---- MinIO (private service, official image + disk) ----
  - type: pserv
    name: avgcxr-minio
    runtime: image
    image:
      url: docker.io/minio/minio:latest
    # On Render the dockerCommand REPLACES the image entrypoint, so it must invoke
    # the `minio` binary itself. `server ...` alone isn't an executable and exits
    # 128 with no output.
    dockerCommand: minio server /data --address :10000 --console-address :9001
    plan: starter
    disk:
      name: minio-data
      mountPath: /data
      sizeGB: 20
    envVars:
      # Pin the access key to a clean alphanumeric value — generateValue can emit
      # '/' and '=', which are invalid in a MinIO root user (access key).
      - key: MINIO_ROOT_USER
        value: avgcxrminioadmin
      - key: MINIO_ROOT_PASSWORD
        generateValue: true

  # ============================================================
  # BACKEND (Java 21 / Spring Boot — built from repo-root context)
  # ============================================================

  # ---- API ----
  - type: web
    name: avgcxr-api
    runtime: docker
    dockerfilePath: ./apps/api/Dockerfile
    dockerContext: .
    plan: standard
    # Only rebuild when API code or the reactor root changes (not on frontend/CMS commits).
    buildFilters:
      paths:
        - apps/api/**
        - pom.xml
    healthCheckPath: /actuator/health
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # Postgres (direct — PGBOUNCER_PORT reused as the real PG port)
      - key: DB_HOST
        fromDatabase: { name: avgcxr-postgres, property: host }
      - key: PGBOUNCER_PORT
        fromDatabase: { name: avgcxr-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: avgcxr-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: avgcxr-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: avgcxr-postgres, property: password }
      # Redis (internal — passwordless; app default for REDIS_PASSWORD is empty)
      - key: REDIS_HOST
        fromService: { name: avgcxr-redis, type: redis, property: host }
      - key: REDIS_PORT
        fromService: { name: avgcxr-redis, type: redis, property: port }
      # RabbitMQ
      - key: RABBITMQ_HOST
        fromService: { name: avgcxr-rabbitmq, type: pserv, property: host }
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        value: avgcxr_rmq_user
      - key: RABBITMQ_PASSWORD
        fromService: { name: avgcxr-rabbitmq, type: pserv, envVarKey: RABBITMQ_DEFAULT_PASS }
      - key: RABBITMQ_VHOST
        value: "/"
      # Elasticsearch
      - key: ELASTICSEARCH_HOST
        fromService: { name: avgcxr-elasticsearch, type: pserv, property: host }
      - key: ELASTICSEARCH_PORT
        value: "9200"
      # MinIO internal endpoint (Render private-network host = service name).
      # MinIO access is lazy, so a wrong value won't block API startup — only
      # document uploads; correct it post-deploy if the host differs.
      - key: MINIO_ENDPOINT
        value: http://avgcxr-minio:10000
      - key: MINIO_ACCESS_KEY
        fromService: { name: avgcxr-minio, type: pserv, envVarKey: MINIO_ROOT_USER }
      - key: MINIO_SECRET_KEY
        fromService: { name: avgcxr-minio, type: pserv, envVarKey: MINIO_ROOT_PASSWORD }
      - key: MINIO_BUCKET
        value: application-documents
      # JWT (generated; shared with worker)
      - key: JWT_SECRET
        generateValue: true
      # CORS — predicted portal URLs (correct after deploy if the names differ)
      - key: CORS_ALLOWED_ORIGINS
        value: https://avgcxr-public-portal.onrender.com,https://avgcxr-applicant-portal.onrender.com,https://avgcxr-admin-portal.onrender.com
      # Email (optional — SMTP)
      - key: EMAIL_HOST
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      # ── AI chatbot (Mira) LLM — self-hosted so user data stays in India ──
      # Mira runs the safe rule-based fallback until a provider is configured. To
      # go live with the LLM: stand up Ollama (qwen2.5) on an India-region GPU
      # host, then set these in the Render dashboard —
      #   AVGCXR_LLM_PROVIDER=ollama
      #   AVGCXR_LLM_OLLAMA_BASE_URL=http://<that-host>:11434
      # ChatSafetyGuard (exfil block + PII redaction) + hardened prompts already
      # protect it. See docs/operations/ai-chatbot-llm.md.
      - key: AVGCXR_LLM_PROVIDER
        sync: false
      - key: AVGCXR_LLM_OLLAMA_BASE_URL
        sync: false
      - key: AVGCXR_LLM_OLLAMA_MODEL
        value: qwen2.5:7b
      # Field-level encryption of sensitive PII at rest (tender §IV.8): address,
      # pincode, company CIN/GSTIN/contact. Generate a 256-bit key ONCE and keep it
      # safe (losing it makes encrypted rows unrecoverable):  openssl rand -base64 32
      # Until set, those columns store plaintext (dev); setting it encrypts on write.
      - key: APP_ENCRYPTION_KEY
        sync: false
      # Blind-index key for email/phone exact-match lookup once those columns are
      # encrypted (tender §IV.8). Use a value DISTINCT from APP_ENCRYPTION_KEY.
      # Inert until set + the cutover in docs/security/pii-blind-index.md is run.
      - key: APP_BLIND_INDEX_KEY
        sync: false
      # ── Internal notification delivery (worker → API callback) ──
      # Shared secret protecting POST /api/v1/notifications/{email,sms,push}. Must
      # match the worker's AVGCXR_API_INTERNAL_TOKEN. Until set, those endpoints
      # are closed (503).  Generate:  openssl rand -hex 32
      - key: AVGCXR_API_INTERNAL_TOKEN
        sync: false
      # ── Email gateway (SMTP) ── set all to deliver real email; else logs only.
      - key: AVGCXR_MAIL_ENABLED
        value: "false"
      - key: AVGCXR_MAIL_FROM
        sync: false
      - key: SPRING_MAIL_HOST
        sync: false
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      # ── SMS gateway (MSG91) ── set auth-key (DLT-approved) to deliver real SMS.
      - key: AVGCXR_SMS_MSG91_AUTH_KEY
        sync: false
      - key: AVGCXR_SMS_MSG91_SENDER_ID
        value: ELCOTN
      # ── Payment gateway (Razorpay) ── set test/live keys to enable; else /orders
      # returns 503 and GET /payments/config reports enabled:false.
      - key: AVGCXR_PAYMENT_RAZORPAY_KEY_ID
        sync: false
      - key: AVGCXR_PAYMENT_RAZORPAY_KEY_SECRET
        sync: false
      - key: AVGCXR_PAYMENT_CURRENCY
        value: INR
      # ── SSO / OIDC federation (ELCOT IdP or Keycloak) ── set the client id+secret
      # and the IdP issuer-uri to activate federated SSO (see SsoSecurityConfig).
      # Inert until the client-id is set; the email/password JWT login is unaffected.
      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_ID
        sync: false
      - key: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KEYCLOAK_CLIENT_SECRET
        sync: false
      - key: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KEYCLOAK_ISSUER_URI
        sync: false
      - key: AVGCXR_SSO_SUCCESS_REDIRECT
        sync: false

  # ---- Worker (background; no inbound traffic) ----
  - type: worker
    name: avgcxr-worker
    runtime: docker
    dockerfilePath: ./apps/worker/Dockerfile
    dockerContext: .
    plan: starter
    # Only rebuild when worker code or the reactor root changes.
    buildFilters:
      paths:
        - apps/worker/**
        - pom.xml
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DB_HOST
        fromDatabase: { name: avgcxr-postgres, property: host }
      - key: PGBOUNCER_PORT
        fromDatabase: { name: avgcxr-postgres, property: port }
      - key: DB_NAME
        fromDatabase: { name: avgcxr-postgres, property: database }
      - key: DB_USER
        fromDatabase: { name: avgcxr-postgres, property: user }
      - key: DB_PASSWORD
        fromDatabase: { name: avgcxr-postgres, property: password }
      - key: REDIS_HOST
        fromService: { name: avgcxr-redis, type: redis, property: host }
      - key: REDIS_PORT
        fromService: { name: avgcxr-redis, type: redis, property: port }
      - key: RABBITMQ_HOST
        fromService: { name: avgcxr-rabbitmq, type: pserv, property: host }
      - key: RABBITMQ_PORT
        value: "5672"
      - key: RABBITMQ_USER
        value: avgcxr_rmq_user
      - key: RABBITMQ_PASSWORD
        fromService: { name: avgcxr-rabbitmq, type: pserv, envVarKey: RABBITMQ_DEFAULT_PASS }
      - key: RABBITMQ_VHOST
        value: "/"
      - key: ELASTICSEARCH_HOST
        fromService: { name: avgcxr-elasticsearch, type: pserv, property: host }
      - key: ELASTICSEARCH_PORT
        value: "9200"
      - key: MINIO_ENDPOINT
        value: http://avgcxr-minio:10000
      - key: MINIO_ACCESS_KEY
        fromService: { name: avgcxr-minio, type: pserv, envVarKey: MINIO_ROOT_USER }
      - key: MINIO_SECRET_KEY
        fromService: { name: avgcxr-minio, type: pserv, envVarKey: MINIO_ROOT_PASSWORD }
      - key: MINIO_BUCKET
        value: application-documents
      - key: JWT_SECRET
        fromService: { name: avgcxr-api, type: web, envVarKey: JWT_SECRET }
      # Notification delivery callback into the API. Internal token MUST match the
      # API's AVGCXR_API_INTERNAL_TOKEN; base-url is the API's internal address.
      - key: AVGCXR_API_INTERNAL_TOKEN
        sync: false
      - key: AVGCXR_API_BASE_URL
        value: http://avgcxr-api:10000

  # ============================================================
  # CMS (Strapi 5 — built from apps/cms context)
  # ============================================================
  - type: web
    name: avgcxr-cms
    runtime: docker
    dockerfilePath: ./apps/cms/Dockerfile
    dockerContext: ./apps/cms
    plan: starter
    # Only rebuild when CMS code changes.
    buildFilters:
      paths:
        - apps/cms/**
    healthCheckPath: /_health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_HOST
        fromDatabase: { name: avgcxr-cms-db, property: host }
      - key: DATABASE_PORT
        fromDatabase: { name: avgcxr-cms-db, property: port }
      - key: DATABASE_NAME
        fromDatabase: { name: avgcxr-cms-db, property: database }
      - key: DATABASE_USERNAME
        fromDatabase: { name: avgcxr-cms-db, property: user }
      - key: DATABASE_PASSWORD
        fromDatabase: { name: avgcxr-cms-db, property: password }
      - key: DATABASE_SSL
        value: "false"
      - key: APP_KEYS
        generateValue: true
      - key: ADMIN_JWT_SECRET
        generateValue: true
      - key: API_TOKEN_SALT
        generateValue: true
      - key: TRANSFER_TOKEN_SALT
        generateValue: true
      - key: JWT_SECRET
        generateValue: true

  # ============================================================
  # FRONTENDS (Angular 19 static sites — Render CDN)
  # apiUrl/strapiUrl are baked into environment.prod.ts at build time and
  # already point at avgcxr-api / avgcxr-cms. .npmrc sets frozen-lockfile=false
  # so the mock-registry lockfile regenerates on Render's real npm.
  # ============================================================
  - type: web
    name: avgcxr-public-portal
    runtime: static
    buildCommand: >-
      corepack enable &&
      pnpm install --no-frozen-lockfile &&
      pnpm exec nx build public-portal --configuration=production
    staticPublishPath: dist/public-portal/browser
    # Rebuild only when this app, a shared lib, or a workspace build file changes.
    buildFilters:
      paths:
        - apps/public-portal/**
        - libs/**
        - package.json
        - pnpm-lock.yaml
        - nx.json
        - tsconfig.base.json
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://avgcxr-cms.onrender.com; connect-src 'self' https://avgcxr-api.onrender.com wss://avgcxr-api.onrender.com https://avgcxr-cms.onrender.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
      - path: /*
        name: Permissions-Policy
        value: "geolocation=(), camera=(), payment=()"

  - type: web
    name: avgcxr-applicant-portal
    runtime: static
    buildCommand: >-
      corepack enable &&
      pnpm install --no-frozen-lockfile &&
      pnpm exec nx build applicant-portal --configuration=production
    staticPublishPath: dist/applicant-portal/browser
    # Rebuild only when this app, a shared lib, or a workspace build file changes.
    buildFilters:
      paths:
        - apps/applicant-portal/**
        - libs/**
        - package.json
        - pnpm-lock.yaml
        - nx.json
        - tsconfig.base.json
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://avgcxr-cms.onrender.com; connect-src 'self' https://avgcxr-api.onrender.com wss://avgcxr-api.onrender.com https://avgcxr-cms.onrender.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
      - path: /*
        name: Permissions-Policy
        value: "geolocation=(), camera=(), payment=()"

  - type: web
    name: avgcxr-admin-portal
    runtime: static
    buildCommand: >-
      corepack enable &&
      pnpm install --no-frozen-lockfile &&
      pnpm exec nx build admin-portal --configuration=production
    staticPublishPath: dist/admin-portal/browser
    # Rebuild only when this app, a shared lib, or a workspace build file changes.
    buildFilters:
      paths:
        - apps/admin-portal/**
        - libs/**
        - package.json
        - pnpm-lock.yaml
        - nx.json
        - tsconfig.base.json
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: "20.18.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-Frame-Options
        value: SAMEORIGIN
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
      - path: /*
        name: Content-Security-Policy
        value: "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; img-src 'self' data: blob: https://avgcxr-cms.onrender.com; connect-src 'self' https://avgcxr-api.onrender.com wss://avgcxr-api.onrender.com https://avgcxr-cms.onrender.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'"
      - path: /*
        name: Permissions-Policy
        value: "geolocation=(), camera=(), payment=()"
