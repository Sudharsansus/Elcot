name: CI - Frontend

on:
  push:
    branches: [main]
    paths:
      - 'apps/public-portal/**'
      - 'apps/admin-portal/**'
      - 'apps/applicant-portal/**'
      - 'apps/applicant-portal/**'
      - 'libs/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - 'nx.json'
      - 'tsconfig.base.json'
      - '.github/workflows/ci-frontend.yml'
  pull_request:
    branches: [main]

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        project: [public-portal, admin-portal, applicant-portal]

    env:
      NX_NO_CLOUD: 'true'
      CI: 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile --shamefully-hoist

      - name: Build ${{ matrix.project }}
        run: pnpm nx run ${{ matrix.project }}:build:production --skip-nx-cache
        env:
          CI: 'true'
