name: CI - CMS

on:
  push:
    branches: [main]
    paths:
      - 'apps/cms/**'
      - '.github/workflows/ci-cms.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/cms/**'

concurrency:
  group: cms-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: apps/cms
    env:
      CI: 'true'
      SKIP_BOOTSTRAP: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm 9
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18'
          cache: 'pnpm'

      - name: Install CMS dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Strapi admin
        env:
          CI: 'true'
          STRAPI_ADMIN_BACKEND_URL: 'http://localhost:1337'
          HOST: '0.0.0.0'
          PORT: '1337'
          DATABASE_CLIENT: 'sqlite'
          DATABASE_FILENAME: '.tmp/data.db'
          APP_KEYS: 'ciKey1,ciKey2,ciKey3,ciKey4'
          API_TOKEN_SALT: 'ci-token-salt-not-secret-12345'
          ADMIN_JWT_SECRET: 'ci-admin-jwt-not-secret-12345'
          TRANSFER_TOKEN_SALT: 'ci-transfer-salt-not-secret-12345'
          JWT_SECRET: 'ci-jwt-secret-not-secret-12345'
        run: pnpm run build
