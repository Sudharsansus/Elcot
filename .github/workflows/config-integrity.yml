name: Config Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      # Pure Node built-ins — no dependency install needed.
      - name: Check config integrity
        run: node scripts/check-config-integrity.mjs
