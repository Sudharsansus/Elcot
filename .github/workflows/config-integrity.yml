name: Config Integrity

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'pnpm'
      # The committed lockfile is from a mock registry; regenerate it on real npm
      # so the overrides->lockfile comparison reflects pnpm-workspace.yaml.
      - name: Regenerate lockfile (real npm)
        run: pnpm install --no-frozen-lockfile
      - name: Check config integrity
        run: node scripts/check-config-integrity.mjs
