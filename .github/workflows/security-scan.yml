name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run security audit (with known-issues filter)
        run: |
          set +e
          pnpm audit --json > audit.json
          set -e
          node scripts/check-audit.mjs audit.json
      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Resolve Maven dependencies
        run: mvn -B -ntp -pl apps/api -am dependency:resolve -DskipTests
      - name: mvn dependency:tree (Java dependencies)
        run: mvn -B -ntp -pl apps/api -am dependency:tree -DskipTests
