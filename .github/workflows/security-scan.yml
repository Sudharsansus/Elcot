name: Security Scan
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
      # Mock-registry lockfile → regenerate on real npm (can't frozen-install).
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile
      - name: Run dependency audit (fails on any critical/high — no whitelist)
        run: node scripts/check-audit.mjs
      - uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven
      - name: Build & test API module
        run: mvn -B -ntp -pl apps/api -am verify -Dspring.profiles.active=test
        shell: bash
      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            apps/api/target/surefire-reports/
            apps/api/target/failsafe-reports/
          retention-days: 7
          if-no-files-found: ignore
