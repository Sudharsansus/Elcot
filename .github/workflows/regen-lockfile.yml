name: Regenerate Lockfile

# Generates a REAL, deployable pnpm-lock.yaml on GitHub's real npm registry and
# commits it back to main. The committed lockfile was produced on a machine whose
# npm registry is a mock (synthetic versions), so Render's strict frozen install
# rejects it. Run this once (Actions tab -> Regenerate Lockfile -> Run workflow,
# or via the API) to replace it with a real one. After it lands, Render's static
# builds (and any frozen install) work.

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.18.0'

      - name: Regenerate lockfile on real npm
        run: pnpm install --no-frozen-lockfile

      - name: Commit the real lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --cached --quiet; then
            echo "Lockfile already up to date — nothing to commit."
          else
            git commit -m "chore: regenerate pnpm-lock.yaml on real npm (deployable)"
            git push origin main
          fi
