name: CI - Backend

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'packages/**'
      - 'pom.xml'
      - '.github/workflows/ci-backend.yml'
  pull_request:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/worker/**'
      - 'packages/**'
      - 'pom.xml'

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: avgc_xr_test
          POSTGRES_USER: avgc_test
          POSTGRES_PASSWORD: avgc_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        ports: ['5672:5672']
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      MAVEN_OPTS: "-Xmx2g -XX:MaxRAMPercentage=75.0"
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/avgc_xr_test
      SPRING_DATASOURCE_USERNAME: avgc_test
      SPRING_DATASOURCE_PASSWORD: avgc_test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: avgc_xr_test
      DB_USER: avgc_test
      DB_PASSWORD: avgc_test
      RABBITMQ_HOST: localhost
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASSWORD: guest
      JWT_SECRET: ci-test-secret-key-for-github-actions-must-be-256-bits-long-enough
      JWT_EXPIRATION: 86400000
      JWT_REFRESH_EXPIRATION: 604800000
      SPRING_PROFILES_ACTIVE: test
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      ELASTICSEARCH_HOST: localhost
      ELASTICSEARCH_PORT: 9200
      MINIO_ENDPOINT: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      CORS_ALLOWED_ORIGINS: http://localhost:4200

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build & test API module
        run: |
          mvn -B -ntp -pl apps/api -am verify -Dspring.profiles.active=test
        shell: bash

      - name: Upload surefire reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-test-reports
          path: |
            apps/api/target/surefire-reports/
            apps/api/target/failsafe-reports/
          retention-days: 7
          if-no-files-found: ignore
