# ══════════════════════════════════════════════════════════════
# Tamil Nadu AVGC-XR Portal — API Configuration
# ══════════════════════════════════════════════════════════════
server:
  port: ${PORT:8080}
  servlet:
    context-path: /
  forward-headers-strategy: native
  shutdown: graceful

spring:
  application:
    name: avgcxr-api

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ─── DataSource (through PgBouncer) ─────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:${PGBOUNCER_PORT:5432}}/${DB_NAME:avgcxr_portal}?prepareThreshold=0
    username: ${DB_USER:avgcxr_user}
    password: ${DB_PASSWORD:avgcxr_user}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      pool-name: avgcxr-hikari
      leak-detection-threshold: 60000
      data-source-properties:
        reWriteBatchedInserts: true

  # ─── JPA ───────────────────────────────────────────────
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
          fetch_size: 200
          time_zone: Asia/Kolkata
        order_inserts: true
        order_updates: true
        generate_statistics: false
        jdbc.batch_versioned_data: true

  # ─── Flyway ────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: '0'
    validate-migration-naming: true
    table: flyway_schema_history

  # ─── Redis ─────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # ─── RabbitMQ ──────────────────────────────────────────
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:avgcxr_rmq_user}
    password: ${RABBITMQ_PASSWORD:avgcxr_rmq_password}
    virtual-host: ${RABBITMQ_VHOST:/avgcxr}
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 10
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
          multiplier: 2.0
          max-interval: 10000ms
    template:
      retry:
        enabled: true
        max-attempts: 3
        initial-interval: 500ms

  # ─── Email ─────────────────────────────────────────────
  mail:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
          connectiontimeout: 5000
          writetimeout: 5000
          readtimeout: 5000

  # ─── Elasticsearch ─────────────────────────────────────
  elasticsearch:
    uris: http://${ELASTICSEARCH_HOST:localhost}:${ELASTICSEARCH_PORT:9200}

  # ─── Servlet ───────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: ${FILE_UPLOAD_MAX_SIZE:50MB}
      max-request-size: ${FILE_UPLOAD_MAX_SIZE:50MB}

  # ─── Jackson ───────────────────────────────────────────
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
      write-durations-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: true
    property-naming-strategy: SNAKE_CASE

# ─── Flowable BPMN 2.0 ──────────────────────────────────
flowable:
  database-schema-update: true
  async-executor-activate: false
  process-definition-location-prefix: classpath*:/processes/
  history-level: audit
  mail-server:
    host: ${EMAIL_HOST:smtp.gmail.com}
    port: ${EMAIL_PORT:587}
    username: ${EMAIL_USER:}
    password: ${EMAIL_PASSWORD:}

# ─── MinIO (File Storage) ───────────────────────────────
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:application-documents}

# ─── JWT ─────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:default-secret-change-in-production-must-be-256-bits-long}
  access-token-expiration: ${JWT_EXPIRATION:86400000}
  refresh-token-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  issuer: avgcxr-portal

# ─── CORS ────────────────────────────────────────────────
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost:4201,http://localhost:4202}

# ─── Management / Actuator ──────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      roles: ADMIN
      probes:
        enabled: true
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http.server.requests: true
      percentiles:
        http.server.requests: 0.5, 0.95, 0.99
      slo:
        http.server.requests: 50ms, 100ms, 200ms, 500ms, 1s, 2s

# ─── Logging ─────────────────────────────────────────────
logging:
  level:
    in.elcot.avgcxr: DEBUG
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.flowable: WARN
    org.hibernate.SQL: WARN
    org.hibernate.stat: WARN
    io.lettuce: WARN
    com.zaxxer.hikari: WARN
