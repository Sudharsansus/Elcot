<div class="dashboard" data-testid="applicant-dashboard">
  <h1>Welcome to AVGC-XR Portal</h1>
  <div class="stats-grid">
    <avgc-card title="Total Applications" [elevated]="true"><p class="stat-value">{{ stats().total }}</p></avgc-card>
    <avgc-card title="Approved" [elevated]="true"><p class="stat-value success">{{ stats().approved }}</p></avgc-card>
    <avgc-card title="Pending" [elevated]="true"><p class="stat-value warning">{{ stats().pending }}</p></avgc-card>
    <avgc-card title="Rejected" [elevated]="true"><p class="stat-value error">{{ stats().rejected }}</p></avgc-card>
  </div>
</div>
