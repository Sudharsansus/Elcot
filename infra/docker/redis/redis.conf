# Redis configuration for AVGC-XR Portal session cache
bind 0.0.0.0
port 6379
protected-mode yes
requirepass avgcxr_redis_dev_password
maxmemory 256mb
maxmemory-policy allkeys-lru
timeout 300
tcp-keepalive 60
tcp-backlog 511

# Persistence - RDB snapshots
save 900 1
save 300 10
save 60 10000
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client limits
maxclients 10000
