# RabbitMQ configuration for AVGC-XR Portal
# Handles async events: notifications, indexing, exports

## Listeners
listeners.tcp.default = 5672
management.tcp.port = 15672

## Authentication
auth_mechanisms = PLAIN AMQPLAIN
auth_backends.1 = internal

## Memory
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.75

## Disk free space limit
disk_free_limit.absolute = 2GB

## Queue defaults
queue_default_ttl = 604800000
default_vhost = /avgcxr

## Dead letter exchanges
dead_letter_exchange = avgcxr.dlx
dead_letter_routing_key = avgcxr.dead

## Consumer timeout
consumer_timeout = 1800000

## Log levels
log.console.level = info
log.file.level = info
log.file = /var/log/rabbitmq/rabbitmq.log

## Collector
collect_statistics = coarse
collect_statistics_interval = 10000
