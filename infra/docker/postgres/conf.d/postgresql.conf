# PostgreSQL 16 configuration for AVGC-XR Portal
# Tuned for Tamil Nadu government workloads

# Connection settings
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# Memory settings (assumes 4GB container)
shared_buffers = 1GB
effective_cache_size = 3GB
work_mem = 16MB
maintenance_work_mem = 256MB
huge_pages = try

# WAL settings
wal_level = replica
max_wal_size = 2GB
min_wal_size = 512MB
checkpoint_completion_target = 0.9
wal_buffers = 64MB
checkpoint_timeout = 10min

# Parallel query
max_worker_processes = 4
max_parallel_workers_per_gather = 2
max_parallel_workers = 4
max_parallel_maintenance_workers = 2

# Query tuning
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 100

# Logging
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 500
log_checkpoints = on
log_connections = on
log_disconnections = on
log_line_prefix = '%t [%p] %u@%d '

# Autovacuum
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_scale_factor = 0.02
autovacuum_vacuum_cost_limit = 1000

# Statement timeout (prevent runaway queries)
statement_timeout = 60000
idle_in_transaction_session_timeout = 300000

# Locale
lc_messages = 'en_IN.utf8'
lc_monetary = 'en_IN.utf8'
lc_numeric = 'en_IN.utf8'
lc_time = 'en_IN.utf8'

# Extensions loaded at startup (see 01-init-extensions.sql)
# shared_preload_libraries = 'pg_stat_statements,pg_trgm'
