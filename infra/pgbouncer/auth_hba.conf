# PgBouncer HBA-style access control
# Format: type  database  user  address  auth_method

# Local connections
local   all   all   trust

# Internal Kubernetes network
host    all   all   10.0.0.0/8    md5
host    all   all   172.16.0.0/12  md5
host    all   all   192.168.0.0/16 md5

# Docker network
host    all   all   172.17.0.0/16  md5

# Admin access from specific IPs
host    all   avgcxr_admin   10.0.0.0/8    md5
host    all   avgcxr_admin   127.0.0.1/32  md5

# Deny all other connections
host    all   all   0.0.0.0/0      reject
