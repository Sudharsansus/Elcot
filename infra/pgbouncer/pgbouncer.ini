[databases]
avgcxr_portal = host=postgres port=5432 dbname=avgcxr_portal
avgcxr_portal_ro = host=postgres port=5432 dbname=avgcxr_portal

[pgbouncer]
# Connection settings
listen_addr = *
listen_port = 6432
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

# Pool settings
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 3
server_reset_query = DISCARD ALL
server_check_query = SELECT 1
server_check_delay = 30

# Timeouts
server_connect_timeout = 15
server_idle_timeout = 600
server_lifetime = 3600
client_idle_timeout = 0
client_login_timeout = 60
idle_transaction_timeout = 60

# Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_stats = 1
stats_period = 60
verbose = 0

# Admin
admin_users = avgcxr_admin
stats_users = avgcxr_admin, avgcxr_rmq_user

# Security
ignore_startup_parameters = extra_float_digits,geqo,search_path
