apiVersion: apps/v1
kind: Deployment
metadata:
  name: avgcxr-elasticsearch
  namespace: avgcxr
  labels:
    app: avgcxr-elasticsearch
    component: elasticsearch
    tier: backend
    part-of: avgcxr-portal
spec:
  replicas: 1
  selector:
    matchLabels:
      app: avgcxr-elasticsearch
  template:
    metadata:
      labels:
        app: avgcxr-elasticsearch
        component: elasticsearch
        tier: backend
        part-of: avgcxr-portal
    spec:
      containers:
        - name: elasticsearch
          image: elasticsearch:8.11.0
          ports:
            - name: http
              containerPort: 9200
              protocol: TCP
          env:
        - name: discovery.type
          value: "single-node"
        - name: xpack.security.enabled
          value: "false"
        - name: TZ
          value: "Asia/Kolkata"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 4Gi
          livenessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /_cluster/health?local=true
              port: 9200
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
