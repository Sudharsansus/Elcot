apiVersion: v1
kind: ConfigMap
metadata:
  name: avgcxr-rabbitmq-config
  namespace: avgcxr
  labels:
    app: avgcxr-rabbitmq
    component: rabbitmq
    part-of: avgcxr-portal
data:
  rabbitmq.conf: |
    listeners.tcp.default = 5672
    management.tcp.port = 15672
    vm_memory_high_watermark.relative = 0.6
    disk_free_limit.absolute = 2GB
    default_vhost = /avgcxr
    dead_letter_exchange = avgcxr.dlx
    collect_statistics = coarse
