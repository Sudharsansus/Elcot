apiVersion: v1
kind: ConfigMap
metadata:
  name: avgcxr-pgbouncer-config
  namespace: avgcxr
  labels:
    app: avgcxr-pgbouncer
    component: pgbouncer
    part-of: avgcxr-portal
data:
  pgbouncer.ini: |
    [databases]
    avgcxr_portal = host=avgcxr-postgres port=5432 dbname=avgcxr_portal
    
    [pgbouncer]
    listen_addr = *
    listen_port = 6432
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = transaction
    max_client_conn = 1000
    default_pool_size = 25
    min_pool_size = 5
    reserve_pool_size = 10
    reserve_pool_timeout = 3
    server_reset_query = DISCARD ALL
    server_check_query = SELECT 1
    server_check_delay = 30
    server_connect_timeout = 15
    server_idle_timeout = 600
    server_lifetime = 3600
  userlist.txt: |
    "avgcxr_app" "avgcxr_app_password_hash"
    "avgcxr_readonly" "avgcxr_readonly_password_hash"
