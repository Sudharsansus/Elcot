apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

namespace: avgcxr-staging

commonLabels:
  environment: staging

patches:
  - target:
      kind: Deployment
      name: avgcxr-api
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
      - op: replace
        path: /spec/template/spec/containers/0/image
        value: elcot/avgcxr-api:staging-latest

  - target:
      kind: Deployment
      name: avgcxr-elasticsearch
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 1Gi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 4Gi

configMapGenerator:
  - name: avgcxr-api-env
    literals:
      - SPRING_PROFILES_ACTIVE=staging
      - LOGGING_LEVEL_IN_ELCOT_AVGCXR=INFO
