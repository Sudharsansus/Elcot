# Gzip compression settings for AVGC-XR Portal
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_buffers 16 8k;
gzip_http_version 1.1;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/x-javascript
    application/xml
    application/xml+rss
    application/atom+xml
    application/ld+json
    application/manifest+json
    application/rdf+xml
    application/rss+xml
    application/geo+json
    image/svg+xml
    font/opentype
    font/ttf
    font/woff
    font/woff2;
