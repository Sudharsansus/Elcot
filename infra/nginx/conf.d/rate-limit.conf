# Rate limiting configuration for AVGC-XR Portal
# Protects against brute-force, DDoS, and abuse

# General request rate
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=form_submit:10m rate=3r/m;
limit_req_zone $binary_remote_addr zone=file_upload:10m rate=2r/m;

# Connection limits
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Status codes to track
limit_req_status 429;

# Custom 429 error page
error_page 429 = @rate_limited;
location @rate_limited {
    default_type application/json;
    return 429 '{"status":429,"error":"Too Many Requests","message":"மீறல் வரம்பு தாண்டியது. சிறிது நேரம் கழித்து மீண்டும் முயற்சிக்கவும்.","path":"/api/errors/rate-limited"}';
}
