packages:
  - 'apps/*'
  - 'libs/*'

# ------------------------------------------------------------------
# NOTE: the security `overrides:` block was temporarily removed.
# pnpm 9.15 does NOT write pnpm-workspace.yaml overrides into the lockfile's
# top-level `overrides:` block, so Render's strict (frozen) install always
# reported ERR_PNPM_LOCKFILE_CONFIG_MISMATCH (workspace had overrides, lockfile
# had none) and the static-site builds failed. Removing them lets a regenerated
# real-npm lockfile install frozen. These pins mostly targeted BUILD-TIME tooling
# (not shipped to browsers). Reinstate them with pnpm 10 (which round-trips
# pnpm-workspace.yaml overrides into the lockfile) + OSV-verified versions as a
# post-deploy hardening step. See docs/DEPLOY-RENDER.md.
# ------------------------------------------------------------------
