server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: avgc-api
    static_configs:
      - targets: ['localhost:8080']
        labels: { job: 'avgc-api', env: 'production' }
    pipeline_stages:
      - docker: {}
      - json: {}
  - job_name: avgc-worker
    static_configs:
      - targets: ['localhost:8081']
        labels: { job: 'avgc-worker', env: 'production' }
    pipeline_stages:
      - json: {}
